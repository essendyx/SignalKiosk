services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - db_data:/data
      - uploads_data:/uploads
      - logs_data:/logs
      - config_data:/config
    ports:
      - "${PLAYBACK_PORT:-8090}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_BASE=/api
      - VITE_PLAYBACK_PORT=${PLAYBACK_PORT:-8090}
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${ADMIN_PORT:-8080}:5173"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cdp-runner:
    build:
      context: ./cdp_runner
      dockerfile: Dockerfile
    environment:
      - APP_BASE_URL=http://app:8000
      - PLAYBACK_COMMAND_ENDPOINT=/api/playback/command
      - POLL_INTERVAL_SECONDS=${CDP_POLL_INTERVAL_SECONDS:-1.5}
      - CDP_PORT=${CDP_PORT:-9222}
      - CHROME_HEADLESS=${CHROME_HEADLESS:-false}
      - CHROME_ALLOW_INSECURE=${CHROME_ALLOW_INSECURE:-false}
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - cdp-runner
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:
  logs_data:
  config_data:
  frontend_node_modules:

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - db_data:/data
      - uploads_data:/uploads
      - logs_data:/logs
      - config_data:/config
      - browser_profiles:/browser_profiles
    ports:
      - "${PLAYBACK_PORT:-8090}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_BASE=/api
      - VITE_PLAYBACK_PORT=${PLAYBACK_PORT:-8090}
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${ADMIN_PORT:-8080}:5173"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kiosk:
    build:
      context: ./kiosk
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DISPLAY=${KIOSK_DISPLAY:-:0}
      - KIOSK_URL=${KIOSK_URL:-http://app:8000/playback}
      - ENABLE_REMOTE_DEBUGGING=${ENABLE_REMOTE_DEBUGGING:-false}
      - KIOSK_DISABLE_WEB_SECURITY=${KIOSK_DISABLE_WEB_SECURITY:-false}
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - kiosk-container
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - browser_profiles:/home/kiosk/.config/chromium
      - logs_data:/logs
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:
  logs_data:
  config_data:
  browser_profiles:
  frontend_node_modules:
